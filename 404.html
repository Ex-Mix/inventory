<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var repo = l.pathname.split('/')
        .filter(function(segment) {
          return segment !== '' && segment !== '404.html';
        })
        .slice(0, pathSegmentsToKeep + 1)
        .join('/');
      var r = l.pathname.substr(1).split('/')
        .slice(pathSegmentsToKeep)
        .join('/')
        .replace(/^\/|\/$/g, '');
      var f = l.hash;
      var s = l.search;
      var d = l.href.split('?')[0].split('#')[0].replace(/\/$/, '');
      var baseURL = d.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/';
      var u = baseURL + (r ? '/' + r : '') + f + s;
      window.location.replace(u);
    </script>
  </head>
  <body>
    <noscript>
      <h1>404</h1>
      <p>Redirecting to the correct page...</p>
    </noscript>
  </body>
</html>
